<script>
// ===================== Constants =====================
// Columbus, Ohio
const LAT = 39.9612;
const LON = -82.9988;
const DEG = Math.PI / 180;

// Julian Day from a JS Date (UT)
function julianDay(d) {
  let y = d.getUTCFullYear();
  let m = d.getUTCMonth() + 1;
  const day = d.getUTCDate()
    + (d.getUTCHours() + d.getUTCMinutes()/60 + d.getUTCSeconds()/3600) / 24;
  if (m <= 2) { y -= 1; m += 12; }
  const a = Math.floor(y / 100);
  const b = 2 - a + Math.floor(a / 4);
  return Math.floor(365.25 * (y + 4716))
       + Math.floor(30.6001 * (m + 1)) + day + b - 1524.5;
}
function norm360(x) { return ((x % 360) + 360) % 360; }

// ===================== Sun / Moon =====================
function sunLonTropical(jd) {
  const n = jd - 2451545.0;
  const L = norm360(280.460 + 0.9856474 * n);
  const g = norm360(357.528 + 0.9856003 * n) * DEG;
  return norm360(L + 1.915 * Math.sin(g) + 0.020 * Math.sin(2*g));
}
function moonLonTropical(jd) {
  const T = (jd - 2451545.0) / 36525.0;
  const Lp = 218.3164477 + 481267.88123421 * T;
  const D  = norm360(297.8501921 + 445267.1114034 * T) * DEG;
  const M  = norm360(357.5291092 + 35999.0502909 * T)  * DEG;
  const Mp = norm360(134.9633964 + 477198.8675055 * T) * DEG;
  const lon = Lp
    + 6.289  * Math.sin(Mp)
    - 1.274  * Math.sin(Mp - 2*D)
    + 0.658  * Math.sin(2*D)
    - 0.186  * Math.sin(M)
    - 0.059  * Math.sin(2*Mp - 2*D)
    - 0.057  * Math.sin(Mp - 2*D + M)
    + 0.053  * Math.sin(Mp + 2*D)
    + 0.046  * Math.sin(2*D - M)
    + 0.041  * Math.sin(Mp - M)
    - 0.035  * Math.sin(D)
    - 0.031  * Math.sin(Mp + M);
  return norm360(lon);
}

function moonPhaseInfo(date) {
  const jd = julianDay(date);
  const elong = norm360(moonLonTropical(jd) - sunLonTropical(jd));
  const illum = (1 - Math.cos(elong * DEG)) / 2 * 100;
  const age = elong / 360 * 29.53058867;
  let name, emoji;
  if (elong < 22.5 || elong >= 337.5) { name="New Moon"; emoji="🌑"; }
  else if (elong < 67.5)              { name="Waxing Crescent"; emoji="🌒"; }
  else if (elong < 112.5)             { name="First Quarter"; emoji="🌓"; }
  else if (elong < 157.5)             { name="Waxing Gibbous"; emoji="🌔"; }
  else if (elong < 202.5)             { name="Full Moon"; emoji="🌕"; }
  else if (elong < 247.5)             { name="Waning Gibbous"; emoji="🌖"; }
  else if (elong < 292.5)             { name="Last Quarter"; emoji="🌗"; }
  else                                { name="Waning Crescent"; emoji="🌘"; }
  return { name, illum, age, emoji, elong };
}

// ===================== Tithi =====================
const TITHI_NAMES = [
  "Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami",
  "Shashthi","Saptami","Ashtami","Navami","Dashami",
  "Ekadashi","Dwadashi","Trayodashi","Chaturdashi","Purnima",
  "Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami",
  "Shashthi","Saptami","Ashtami","Navami","Dashami",
  "Ekadashi","Dwadashi","Trayodashi","Chaturdashi","Amavasya"
];

function tithiInfo(date) {
  const jd = julianDay(date);
  const elong = norm360(moonLonTropical(jd) - sunLonTropical(jd));
  const idx = Math.floor(elong / 12);
  const isShukla = idx < 15;
  return {
    globalIndex: idx + 1,
    name: TITHI_NAMES[idx],
    pakshaShort: isShukla ? "Shukla" : "Krishna",
    paksha: isShukla ? "Shukla (Waxing)" : "Krishna (Waning)",
    isShukla,
    tithiInPaksha: (idx % 15) + 1,
    progress: (elong % 12) / 12 * 100,
  };
}

// ===================== Swara Yoga =====================
const NADI_INFO = {
  "Ida":     { nostril:"Left",  element:"Lunar / Cool",
               good:"Meditation, study, planning, rest, sleep",
               avoid:"Heavy exertion, confrontation", emoji:"🌙" },
  "Pingala": { nostril:"Right", element:"Solar / Warm",
               good:"Exercise, eating, action, debate",
               avoid:"Sleep, meditation", emoji:"☀️" },
  "Sushumna":{ nostril:"Both equal", element:"Balanced / Spiritual",
               good:"Meditation and pranayama ONLY",
               avoid:"Any worldly activity", emoji:"🧘" },
};

function sunriseNadiForTithi(tithiInPaksha, isShukla) {
  const group = Math.floor((tithiInPaksha - 1) / 3);
  if (isShukla) return group % 2 === 0 ? "Ida" : "Pingala";
  return group % 2 === 0 ? "Pingala" : "Ida";
}

function currentNadi(nowLocal, sunriseLocal, sunriseNadi,
                     blockMin = 90, sushumnaWin = 4) {
  let base = sunriseLocal;
  if (nowLocal < sunriseLocal) {
    base = new Date(sunriseLocal.getTime() - 86400000);
  }
  const delta = (nowLocal - base) / 60000;
  const blk = Math.floor(delta / blockMin);
  const into = delta - blk * blockMin;
  const rem = blockMin - into;
  const nadi = blk % 2 === 0 ? sunriseNadi
                             : (sunriseNadi === "Ida" ? "Pingala" : "Ida");
  return { nadi, into, rem, sushumna: into < sushumnaWin };
}

// ===================== Sunrise / Sunset =====================
function sunriseSunset(dateLocal, lat, lon, tzOffset) {
  const N = Math.floor(
    (Date.UTC(dateLocal.getFullYear(), dateLocal.getMonth(), dateLocal.getDate())
     - Date.UTC(dateLocal.getFullYear(), 0, 0)) / 86400000
  );
  function compute(isSunrise) {
    const zenith = 90.833;
    const lngHour = lon / 15.0;
    const t = N + ((isSunrise ? 6 : 18) - lngHour) / 24;
    const M = 0.9856 * t - 3.289;
    const L = norm360(M + 1.916*Math.sin(M*DEG) + 0.020*Math.sin(2*M*DEG) + 282.634);
    let RA = norm360(Math.atan(0.91764 * Math.tan(L*DEG)) / DEG);
    RA += Math.floor(L/90)*90 - Math.floor(RA/90)*90;
    RA /= 15.0;
    const sinDec = 0.39782 * Math.sin(L * DEG);
    const cosDec = Math.cos(Math.asin(sinDec));
    const cosH = (Math.cos(zenith * DEG) - sinDec * Math.sin(lat*DEG))
               / (cosDec * Math.cos(lat*DEG));
    if (cosH > 1 || cosH < -1) return null;
    let H = isSunrise
      ? 360 - Math.acos(cosH)/DEG
      : Math.acos(cosH)/DEG;
    H /= 15.0;
    const T = H + RA - 0.06571*t - 6.622;
    let UT = T - lngHour;
    UT = ((UT % 24) + 24) % 24;
    return ((UT + tzOffset) % 24 + 24) % 24;
  }
  function toDate(hf) {
    if (hf === null) return null;
    const h = Math.floor(hf);
    const m = Math.floor((hf - h) * 60);
    const s = Math.floor(((hf - h) * 60 - m) * 60);
    const d = new Date(dateLocal);
    d.setHours(h, m, s, 0);
    return d;
  }
  return { sunrise: toDate(compute(true)), sunset: toDate(compute(false)) };
}

// Columbus, Ohio uses US Eastern Time (EST/EDT).
// DST: 2nd Sunday of March to 1st Sunday of November.
// Standard offset is UTC-5 (EST); during DST UTC-4 (EDT).
function easternOffsetHours(dateUTC) {
  const y = dateUTC.getUTCFullYear();
  // 2nd Sunday of March at 2 AM local (~ 7 AM UTC)
  function nthSunday(month, n) {
    const d = new Date(Date.UTC(y, month, 1, 7, 0));
    while (d.getUTCDay() !== 0) d.setUTCDate(d.getUTCDate() + 1);
    d.setUTCDate(d.getUTCDate() + (n - 1) * 7);
    return d;
  }
  const dstStart = nthSunday(2, 2);  // 2nd Sunday of March
  const dstEnd   = nthSunday(10, 1); // 1st Sunday of November
  const isDST = dateUTC >= dstStart && dateUTC < dstEnd;
  return isDST ? -4 : -5;
}

// ===================== Brahma Muhurta =====================
function brahmaMuhurta(sunriseLocal) {
  if (!sunriseLocal) return { start: null, end: null };
  return {
    start: new Date(sunriseLocal.getTime() - 96 * 60000),
    end:   new Date(sunriseLocal.getTime() - 48 * 60000),
  };
}
function brahmaStatus(nowLocal, sunriseLocal) {
  const { start, end } = brahmaMuhurta(sunriseLocal);
  if (!start) return { start: null, end: null, status: "unknown" };
  let status;
  if (nowLocal < start) status = "upcoming";
  else if (nowLocal < end) status = "active";
  else status = "passed";
  return { start, end, status };
}

// ===================== Formatting =====================
function pad(n){ return n < 10 ? "0"+n : ""+n; }
function fmtTime(d) {
  if (!d) return "—";
  let h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12; if (h === 0) h = 12;
  return h + ":" + pad(m) + " " + ampm;
}
function fmtTimeSec(d) {
  if (!d) return "—";
  let h = d.getHours();
  const m = d.getMinutes();
  const s = d.getSeconds();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12; if (h === 0) h = 12;
  return h + ":" + pad(m) + ":" + pad(s) + " " + ampm;
}
function fmtDateFull(d) {
  const months = ["Jan","Feb","Mar","Apr","May","Jun",
                  "Jul","Aug","Sep","Oct","Nov","Dec"];
  return months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
}

// ===================== Main update =====================
let cached = {};

function updateAll() {
  const nowUTC = new Date();
  const tzOff = easternOffsetHours(nowUTC);
  // Build a "local Columbus" date: UTC + tzOff (in ms)
  const localColumbus = new Date(nowUTC.getTime() + tzOff * 3600 * 1000);
  // Treat its UTC fields as local wall-clock fields
  const lNow = new Date(
    localColumbus.getUTCFullYear(), localColumbus.getUTCMonth(),
    localColumbus.getUTCDate(), localColumbus.getUTCHours(),
    localColumbus.getUTCMinutes(), localColumbus.getUTCSeconds()
  );

  const tzLabel = tzOff === -4
    ? "Columbus (EDT, UTC−4)"
    : "Columbus (EST, UTC−5)";

  const mp = moonPhaseInfo(nowUTC);
  const tithi = tithiInfo(nowUTC);

  const lxDate = new Date(lNow.getFullYear(), lNow.getMonth(), lNow.getDate());
  const { sunrise, sunset } = sunriseSunset(lxDate, LAT, LON, tzOff);

  const sunriseNadi = sunriseNadiForTithi(tithi.tithiInPaksha, tithi.isShukla);
  const swara = sunrise ? currentNadi(lNow, sunrise, sunriseNadi) : null;

  // ---------- Header ----------
  const weekdays = ["Sunday","Monday","Tuesday","Wednesday",
                    "Thursday","Friday","Saturday"];
  document.getElementById("dateLine").textContent =
    weekdays[lNow.getDay()] + ", " + fmtDateFull(lNow) + " • " + fmtTime(lNow);

  // ---------- Moon ----------
  document.getElementById("moonEmoji").textContent = mp.emoji;
  document.getElementById("moonPhase").textContent = mp.name;
  document.getElementById("moonStats").textContent =
    `Illuminated: ${mp.illum.toFixed(1)}%  •  Age: ${mp.age.toFixed(1)} days`;

  // ---------- Tithi ----------
  document.getElementById("tithiVal").textContent =
    `${tithi.name}  (${tithi.pakshaShort} ${tithi.tithiInPaksha})\n` +
    `Paksha: ${tithi.paksha}`;

  // ---------- Swara ----------
  if (!swara) {
    document.getElementById("swaraVal").textContent =
      "Cannot compute (no sunrise today).";
  } else {
    const displayNadi = swara.sushumna ? "Sushumna" : swara.nadi;
    const info = NADI_INFO[displayNadi];
    const hr = Math.floor(swara.rem / 60);
    const mn = Math.floor(swara.rem - hr * 60);
    document.getElementById("swaraVal").textContent =
      `${info.emoji} ${displayNadi}  —  ${info.nostril} nostril\n` +
      `${info.element}\n` +
      `Switches in: ${hr}h ${mn}m`;
  }

  // ---------- Sun ----------
  if (sunrise && sunset) {
    const dl = (sunset - sunrise) / 1000;
    const h = Math.floor(dl / 3600);
    const m = Math.floor((dl % 3600) / 60);
    document.getElementById("sunVal").textContent =
      `Sunrise: ${fmtTime(sunrise)}    Sunset: ${fmtTime(sunset)}\n` +
      `Day length: ${h}h ${m}m`;
  } else {
    document.getElementById("sunVal").textContent = "Sun does not rise/set today.";
  }

  // ---------- Brahma Muhurta ----------
  const bm = brahmaStatus(lNow, sunrise);
  const brahmaCard = document.getElementById("brahmaCard");
  brahmaCard.classList.remove("highlight-active");
  let brahmaText;
  if (!bm.start) {
    brahmaText = "Cannot compute (no sunrise today).";
  } else if (bm.status === "passed") {
    const tomorrow = new Date(lxDate.getTime() + 86400000);
    const sr2 = sunriseSunset(tomorrow, LAT, LON, tzOff).sunrise;
    if (sr2) {
      const bm2 = brahmaMuhurta(sr2);
      const mins = Math.floor((bm2.start - lNow) / 60000);
      const hrs = Math.floor(mins / 60);
      const mn = mins % 60;
      brahmaText = `Tomorrow: ${fmtTime(bm2.start)} – ${fmtTime(bm2.end)}  (48 min)\n` +
                   `Starts in ${hrs}h ${mn}m`;
    } else {
      brahmaText = `Today: ${fmtTime(bm.start)} – ${fmtTime(bm.end)}  (48 min)\nAlready passed`;
    }
  } else if (bm.status === "active") {
    brahmaCard.classList.add("highlight-active");
    const minsLeft = Math.floor((bm.end - lNow) / 60000) + 1;
    brahmaText = `NOW ACTIVE: ${fmtTime(bm.start)} – ${fmtTime(bm.end)}  (48 min)\n` +
                 `🧘 Ends in ~${minsLeft} min`;
  } else {
    const mins = Math.floor((bm.start - lNow) / 60000);
    const hrs = Math.floor(mins / 60);
    const mn = mins % 60;
    brahmaText = `Today: ${fmtTime(bm.start)} – ${fmtTime(bm.end)}  (48 min)\n` +
                 `Starts in ${hrs}h ${mn}m`;
  }
  document.getElementById("brahmaVal").textContent = brahmaText;

  cached = { nowUTC, lNow, tzLabel, mp, tithi,
             sunrise, sunset, sunriseNadi, swara, bm, tzOff };
}

// ===================== Modals =====================
function openModal(which) {
  const titleEl = document.getElementById("modalTitle");
  const bodyEl = document.getElementById("modalBody");
  const c = cached;
  let title = "", body = "";

  if (which === "moon") {
    title = "Moon Details";
    body =
`Phase: ${c.mp.name}
Illuminated: ${c.mp.illum.toFixed(2)}%
Age: ${c.mp.age.toFixed(2)} days (of 29.53)
Elongation from Sun: ${c.mp.elong.toFixed(2)}°

The moon's phase is determined by its angular
distance from the sun. New Moon at 0°, First
Quarter at 90°, Full Moon at 180°, Last Quarter
at 270°.`;

  } else if (which === "tithi") {
    title = "Tithi Details";
    body =
`${c.tithi.name}  (${c.tithi.pakshaShort} ${c.tithi.tithiInPaksha})
Paksha: ${c.tithi.paksha}
Progress through tithi: ${c.tithi.progress.toFixed(1)}%
Global tithi index: ${c.tithi.globalIndex} of 30

A tithi is 1/30 of a lunar month — the time for
the moon to gain 12° on the sun. Tithis vary in
length from ~19 to ~26 hours depending on the
relative speeds of sun and moon.`;

  } else if (which === "swara") {
    title = "Swara Yoga Details";
    if (!c.swara) {
      body = "Cannot compute (no sunrise today).";
    } else {
      const displayNadi = c.swara.sushumna ? "Sushumna" : c.swara.nadi;
      const info = NADI_INFO[displayNadi];
      const hr = Math.floor(c.swara.rem / 60);
      const mn = Math.floor(c.swara.rem - hr * 60);
      body =
`${info.emoji} Current Nadi: ${displayNadi}
Nostril: ${info.nostril}
Element: ${info.element}

Good for: ${info.good}
Avoid: ${info.avoid}

Sunrise Nadi today: ${c.sunriseNadi}
(determined by tithi group: ${c.tithi.pakshaShort} ${c.tithi.tithiInPaksha})

Minutes into current block: ${c.swara.into.toFixed(1)}
Time until switch: ${hr}h ${mn}m

Swara yoga tracks which nostril is dominant —
breath naturally switches approximately every
90 minutes. The brief overlap (Sushumna) is
traditionally considered the most auspicious
time for spiritual practice.`;
    }

  } else if (which === "sun") {
    title = "Sunrise & Sunset";
    if (c.sunrise && c.sunset) {
      const dl = (c.sunset - c.sunrise) / 1000;
      const h = Math.floor(dl / 3600);
      const m = Math.floor((dl % 3600) / 60);
      body =
`Sunrise: ${fmtTimeSec(c.sunrise)}
Sunset:  ${fmtTimeSec(c.sunset)}
Day length: ${h}h ${m}m

Location: Columbus, Ohio (39.96°N, 82.99°W)
Timezone: ${c.tzLabel}`;
    } else {
      body = "Sun does not rise/set today.";
    }

  } else if (which === "brahma") {
    title = "Brahma Muhurta";
    if (!c.bm.start) {
      body = "Cannot compute (no sunrise today).";
    } else {
      let statusLine;
      if (c.bm.status === "active")
        statusLine = "Status: 🧘 ACTIVE RIGHT NOW";
      else if (c.bm.status === "upcoming")
        statusLine = "Status: Upcoming today";
      else
        statusLine = "Status: Shown for tomorrow (today's has passed)";

      body =
`Start: ${fmtTimeSec(c.bm.start)}
End:   ${fmtTimeSec(c.bm.end)}
Duration: 48 minutes

${statusLine}
Sunrise reference: ${c.sunrise ? fmtTimeSec(c.sunrise) : "—"}
Timezone: ${c.tzLabel}

————————————————————————————

Brahma Muhurta is the 14th muhurta of the night
— the 48-minute window ending 48 minutes before
sunrise (so sunrise − 96 min to sunrise − 48 min).

Traditionally the most auspicious time for:
  • Meditation and japa
  • Study of sacred texts
  • Pranayama and yoga
  • Setting intentions for the day

The mind is naturally sattvic at this hour —
quiet, clear, and receptive before the rush of
the day begins.`;
    }
  }

  titleEl.textContent = title;
  bodyEl.textContent = body;
  document.getElementById("modalBg").classList.add("show");
}

document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("click", () => openModal(card.dataset.modal));
});
document.getElementById("closeBtn").addEventListener("click", () => {
  document.getElementById("modalBg").classList.remove("show");
});
document.getElementById("modalBg").addEventListener("click", (e) => {
  if (e.target.id === "modalBg")
    document.getElementById("modalBg").classList.remove("show");
});

updateAll();
setInterval(updateAll, 60 * 1000);

</script>
</body>
</html>
